<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>路段分析｜RoadSafe AI</title>
  <link rel="stylesheet" href="src/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="src/main.js" defer></script>
</head>
<body>

<header class="site-header scrolled" id="header">
  <div class="container header-inner">
    <a class="brand" href="index.html"><i data-lucide="shield-alert"></i><span>RoadSafe AI</span></a>
    <nav class="nav-links">
      <a href="index.html">首頁</a><a href="menu.html">分析目錄</a><a href="overview.html">數據總覽</a><a href="hotspots.html">路段地圖</a><a href="prediction.html">AI 預測</a>
    </nav>
  </div>
</header>

<section class="section" style="padding-top: 140px;">
  <div class="container">
    <div class="eyebrow reveal"><i data-lucide="map-pin"></i> 路段風險地圖</div>
    <h1 class="section-title reveal">易肇事路段分析</h1>
    <p class="section-desc reveal">互動式地圖標記斗六市高風險路段，點擊標記查看詳細資訊。</p>

    <div class="bento-grid" style="margin-bottom: 24px;">
      <div class="bento-card wide reveal">
        <div id="map"></div>
      </div>
      <div class="bento-card reveal stagger-1" style="max-height: 500px; overflow-y: auto;">
        <h3 style="margin-bottom: 16px;">危險路段排行</h3>
        <div id="hotspot-list"></div>
      </div>
    </div>

    <div class="bento-card wide reveal">
      <h3 style="margin-bottom: 16px;">路段分析說明</h3>
      <p style="color: var(--text-secondary); font-size: 15px; line-height: 1.8;">
        以上排名基於近一年事故件數、死傷人數與路段特性綜合計算。<br>
        <strong style="color: var(--danger);">紅色</strong> = 高風險（70+ 分）、<strong style="color: var(--warning);">橙色</strong> = 中風險（45–69 分）、<strong style="color: var(--success);">綠色</strong> = 低風險（&lt;45 分）。<br>
        點擊地圖上的圓圈可查看該路段的主要肇因與建議改善方向。
      </p>
    </div>
  </div>
</section>

<footer style="padding: 40px 0; text-align: center; color: var(--text-muted); font-size: 13px; border-top: 1px solid var(--border);">
  <div class="container">RoadSafe AI · 斗六市交通事故安全診斷專題</div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();

  const hotspots = [
    { name: '雲林路 × 中山路路口', latlng: [23.709, 120.545], score: 85, cause: '機車與汽車擦撞', level: 'high' },
    { name: '大同路路段', latlng: [23.712, 120.548], score: 72, cause: '追撞事故', level: 'high' },
    { name: '明德北路路口', latlng: [23.705, 120.540], score: 68, cause: '行人穿越道事故', level: 'medium' },
    { name: '文化路 × 中正路路口', latlng: [23.708, 120.542], score: 61, cause: '違規左轉', level: 'medium' },
    { name: '大學路路段', latlng: [23.715, 120.552], score: 55, cause: '超速', level: 'medium' },
    { name: '成功路 × 復興路路口', latlng: [23.701, 120.538], score: 48, cause: '闖紅燈', level: 'medium' },
    { name: '鎮南路路段', latlng: [23.718, 120.555], score: 42, cause: '迴轉不當', level: 'low' },
    { name: '建成路 × 林森路路口', latlng: [23.703, 120.535], score: 35, cause: '未保持安全距離', level: 'low' },
  ];

  initMap('map', [23.709, 120.545], 14, hotspots);

  // Build list
  const listEl = document.getElementById('hotspot-list');
  const colorMap = { high: '#ef4444', medium: '#f59e0b', low: '#10b981' };
  hotspots.sort((a, b) => b.score - a.score).forEach((spot, i) => {
    const color = colorMap[spot.level];
    listEl.innerHTML += `
      <div style="display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border);">
        <div style="width:28px; height:28px; border-radius:8px; background:${color}; color:#fff; display:grid; place-items:center; font-size:12px; font-weight:800;">${i+1}</div>
        <div style="flex:1; min-width:0;">
          <div style="font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${spot.name}</div>
          <div style="font-size:12px; color:var(--text-muted);">${spot.cause}</div>
        </div>
        <div style="font-weight:800; font-size:16px; color:${color};">${spot.score}</div>
      </div>
    `;
  });
});
</script>
</body>
</html>
