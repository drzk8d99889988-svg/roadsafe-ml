<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>交通事故安全診斷｜RoadSafe AI</title>
  <link rel="stylesheet" href="src/styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="src/main.js" defer></script>
</head>
<body>

<header class="site-header" id="header">
  <div class="container header-inner">
    <a class="brand" href="index.html">
      <i data-lucide="shield-alert"></i>
      <span>RoadSafe AI</span>
    </a>
    <nav class="nav-links">
      <a href="index.html">首頁</a>
      <a href="menu.html">分析目錄</a>
      <a href="overview.html">數據總覽</a>
      <a href="hotspots.html">路段地圖</a>
      <a href="prediction.html">AI 預測</a>
    </nav>
  </div>
</header>

<section class="page-hero">
  <div class="page-hero-inner">
    <div class="eyebrow reveal">
      <i data-lucide="activity"></i>
      斗六市道路交通事故安全診斷平台
    </div>

    <div class="sparkles-text reveal stagger-1" id="sparkle-title">
      <strong>交通事故<br>安全診斷</strong>
    </div>

    <p class="reveal stagger-2" style="font-size: 18px; color: var(--text-secondary); max-width: 520px; margin: 28px auto 40px;">
      運用機器學習分析路段風險、整合天氣預測，提供本週危險指數與改善建議。
    </p>

    <div class="reveal stagger-3" style="display:flex; gap:16px; justify-content:center; flex-wrap:wrap;">
      <a class="glass-btn" href="menu.html">
        <i data-lucide="compass"></i> 進入分析目錄
      </a>
      <a class="glass-btn-outline" href="prediction.html">
        查看本週預測 <i data-lucide="arrow-right" style="width:16px;height:16px;"></i>
      </a>
    </div>
  </div>
</section>

<section style="padding: 80px 0; background: var(--bg-elevated);">
  <div class="container">
    <div class="bento-grid">
      <div class="bento-card wide reveal">
        <div class="icon-wrap"><i data-lucide="brain-circuit"></i></div>
        <h3>機器學習預測</h3>
        <p>基於歷史事故資料訓練的 Random Forest 模型，預測各路段本週危險指數，無需外部 API。</p>
      </div>
      <div class="bento-card reveal stagger-1">
        <div class="icon-wrap"><i data-lucide="map-pin"></i></div>
        <h3>互動式地圖</h3>
        <p>Leaflet 地圖標記高風險路段，點擊查看詳細事故統計。</p>
      </div>
      <div class="bento-card reveal stagger-2">
        <div class="icon-wrap"><i data-lucide="cloud-sun"></i></div>
        <h3>天氣整合</h3>
        <p>結合一週天氣預報，自動調整危險指數與建議策略。</p>
      </div>
    </div>
  </div>
</section>

<footer style="padding: 40px 0; text-align: center; color: var(--text-muted); font-size: 13px; border-top: 1px solid var(--border);">
  <div class="container">
    RoadSafe AI · 斗六市交通事故安全診斷專題 · 資料來源：政府資料開放平台
  </div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  initSparkles('#sparkle-title', 14);
});
</script>
</body>
</html>
